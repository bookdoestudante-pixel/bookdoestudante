<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Matemática - Book do Estudante</title>

  <link rel="stylesheet" href="./matematica.css" />
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#7a4a24">
<link rel="apple-touch-icon" href="/img/icons/icon-192.png">

<script src="/pwa.js" defer></script>

</head>

<body>
  <div class="bg-fixed" aria-hidden="true"></div>

  <main class="screen" role="main">
    <div class="parchment">

      <header class="title-area">
        <h1 class="title">
          Matemática<br>
          e suas Tecnologias
        </h1>
      </header>

      <section class="topics" aria-label="Tópicos de Matemática">
        <button class="topic-btn" data-topic="aritmetica-algebra" type="button">
          <span class="icon">∑</span>
          Aritmética e Álgebra
        </button>

        <button class="topic-btn" data-topic="geometria-trigonometria" type="button">
          <span class="icon">△</span>
          Geometria e Trigonometria
        </button>

        <button class="topic-btn" data-topic="estatistica-probabilidade" type="button">
          <span class="icon">📊</span>
          Estatística e Probabilidade
        </button>

        <button class="topic-btn" data-topic="mat-aplicada-computacional" type="button">
          <span class="icon">💻</span>
          Matemática Aplicada e Computacional
        </button>

        <button class="topic-btn" data-topic="mat-discreta" type="button">
          <span class="icon">🔢</span>
          Matemática Discreta
        </button>

        <button class="topic-btn" data-topic="financeira-modelagem" type="button">
          <span class="icon">💰</span>
          Matemática Financeira e Modelagem
        </button>
      </section>

      <footer class="nav">
        <button class="nav-btn" id="btnVoltar" type="button" aria-label="Voltar">←</button>
        <button class="nav-btn" id="btnHome" type="button" aria-label="Home">⌂</button>
      </footer>

    </div>
  </main>

  <script src="./matematica.js"></script>
</body>
</html>
