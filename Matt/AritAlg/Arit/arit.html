<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Aritmética - Book do Estudante</title>

  <link rel="stylesheet" href="./arit.css" />

  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#7a4a24">
  <link rel="apple-touch-icon" href="/img/icons/icon-192.png">

  <script src="/pwa.js" defer></script>
</head>

<body>
  <div class="bg-fixed" aria-hidden="true"></div>

  <main class="screen" role="main">
    <div class="parchment">

      <header class="title-area">
        <h1 class="title">Aritmética</h1>
      </header>

      <section class="topics" aria-label="Tópicos de Aritmética">

        <button class="sub-btn" data-go="./ConjNum/conjnum.html" type="button">
          <span class="sub-icon">ℕ</span>
          <span>Conjuntos Numéricos</span>
        </button>

        <button class="sub-btn" data-go="./OpeFun/opefun.html" type="button" disabled>
          <span class="sub-icon">±</span>
          <span>Operações Fundamentais</span>
        </button>

        <button class="sub-btn" data-go="./PotRad/potrad.html" type="button" disabled>
          <span class="sub-icon">x²</span>
          <span>Potenciação e Radiciação</span>
        </button>

        <button class="sub-btn" data-go="./Div/div.html" type="button" disabled>
          <span class="sub-icon">÷</span>
          <span>Divisibilidade</span>
        </button>

        <button class="sub-btn" data-go="./Fracao/fracao.html" type="button" disabled>
          <span class="sub-icon">½</span>
          <span>Frações</span>
        </button>

        <button class="sub-btn" data-go="./NumDec/numdec.html" type="button" disabled>
          <span class="sub-icon">0,1</span>
          <span>Números Decimais</span>
        </button>

        <button class="sub-btn" data-go="./RazProp/razprop.html" type="button" disabled>
          <span class="sub-icon">∶</span>
          <span>Razão e Proporção</span>
        </button>

        <button class="sub-btn" data-go="./Porc/porc.html" type="button" disabled>
          <span class="sub-icon">%</span>
          <span>Porcentagem</span>
        </button>

        <button class="sub-btn" data-go="./MatFinBas/matfinbas.html" type="button" disabled>
          <span class="sub-icon">$</span>
          <span>Matemática Financeira Básica</span>
        </button>

        <button class="sub-btn" data-go="./SeqNum/seqnum.html" type="button" disabled>
          <span class="sub-icon">↗</span>
          <span>Sequências Numéricas</span>
        </button>

      </section>

      <footer class="nav">
        <button class="nav-btn" id="btnVoltar" type="button" aria-label="Voltar">←</button>
        <button class="nav-btn" id="btnHome" type="button" aria-label="Home">⌂</button>
      </footer>

    </div>
  </main>

  <script src="./arit.js"></script>
</body>
</html>
