<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Book do Estudante - Menu</title>
  <link rel="stylesheet" href="./menu.css" />

  <link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#7a4a24">
<link rel="apple-touch-icon" href="/img/icons/icon-192.png">

<script src="/pwa.js" defer></script>

</head>

<body>
  <div class="bg-fixed"></div>
  <!-- se você usa overlay fade no CSS, pode manter:
  <div class="fade"></div>
  -->

  <main class="tela">
    <section class="grid">

      <button class="card" data-destino="linguagens" type="button">
        <span class="icon">✎</span>
        <span class="txt">Linguagens e suas Tecnologias</span>
      </button>

      <!-- Matemática (primário/ativo) -->
      <button class="card is-primary is-active" id="btnMat" data-go="matematica/matematica.html" type="button">
        <span class="icon">√</span>
        <span class="txt">Matemática e suas Tecnologias</span>
      </button>

      <button class="card" data-destino="natureza" type="button">
        <span class="icon">⚛</span>
        <span class="txt">Ciências da Natureza</span>
      </button>

      <button class="card" data-destino="humanas" type="button">
        <span class="icon">🌍</span>
        <span class="txt">Ciências Humanas</span>
      </button>

      <button class="card" data-destino="redacao" type="button">
        <span class="icon">🏛</span>
        <span class="txt">Redação</span>
      </button>

      <button class="card" data-destino="vestibular" type="button">
        <span class="icon">🎓</span>
        <span class="txt">Vestibular</span>
      </button>

    </section>
  </main>

  <script src="./menu.js"></script>
</body>
</html>
