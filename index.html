<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Book do Estudante</title>
  <link rel="stylesheet" href="styles.css" />

  <link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#7a4a24">
<link rel="apple-touch-icon" href="/img/icons/icon-192.png">

<script src="/pwa.js" defer></script>

</head>

<body>
  <div class="bg-fixed" aria-hidden="true"></div>

  <main class="tela" role="main">
    <header class="topo">
      <h1 class="titulo">
        <span>BOOK</span>
        <span class="do">DO</span>
        <span>ESTUDANTE</span>
      </h1>
    </header>

    <section class="meio">
      <!-- 👇 ADICIONADO id="loginForm" -->
      <form id="loginForm" class="login" autocomplete="on">
        
        <label class="campo">
          <span class="sr-only">Usuário</span>
          <!-- 👇 ADICIONADO id="usuario" -->
          <input id="usuario" type="text" name="usuario" placeholder="Usuário" autocomplete="username" />
        </label>

        <label class="campo">
          <span class="sr-only">Senha</span>
          <!-- 👇 ADICIONADO id="senha" -->
          <input id="senha" type="password" name="senha" placeholder="Senha" autocomplete="current-password" />
        </label>

        <button class="btn" type="submit">ENTRAR</button>

        <!-- 👇 ADICIONADO campo de mensagem -->
        <p id="msg" style="text-align:center; font-weight:bold;"></p>

      </form>
    </section>

    <footer class="rodape">
      <div class="copy">© 2026 Book do Estudante</div>
    </footer>
  </main>

  <!-- 👇 IMPORTANTE: carregar o JS -->
  <script src="login.js" defer></script>
</body>
</html>
